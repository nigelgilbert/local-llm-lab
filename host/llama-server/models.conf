# ============================================================================
# Memory tier model configuration for llama-server.
# ============================================================================
# Sourced by scripts/install. Override auto-detection with:
#     LLAMA_TIER=16 ./scripts/install
#
# To configure a tier, set TIER_N_GGUF, TIER_N_CTX, TIER_N_BATCH, plus the
# sampler block (TIER_N_TEMP, TIER_N_TOP_P, TIER_N_TOP_K,
# TIER_N_REPEAT_PENALTY, TIER_N_PRESENCE_PENALTY).
#
# All tiers share the same alias (claw), grammar, and port.


# ----------------------------------------------------------------------------
# 16 GB — Qwen3.5-9B IQ4_XS (~5.0 GB, hybrid-thinking, default-thinking-on)
# ----------------------------------------------------------------------------
# Adopted 2026-05-01 after Sprint 1.19 Sweep 2 cell E + Sweep 3 ceiling
# confirmation (see host/test/logs/T32-TUNING-PROGRESS.md). At n=2:
#   - 47/47 done passed (100%), Wilson 95% CI [0.924, 1.000], +53.7pp over
#     the prior 7B Q5_K_M baseline (87/188 = 46.3%).
#   - Sweep 3 confirmed no extractable perf within IQ4_XS (rep_pen × ctx 2x2
#     all tied at top: pass 100%, lower-CI in [0.920, 0.924], done-ratio in
#     [84.6%, 90.4%]). E remains the Pareto pick for 16 GB hardware
#     ("perfect %utilization" per real-device testing).
#
# Memory footprint: ~5 GB weights + ~2 GB Q8 KV cache @ 32k = ~7 GB total,
# leaves ~9 GB for OS/app on a 16 GB MBP.
#
# Download (unsloth repo, no HF account required):
#   curl -L -C - -o ~/.ollama/gguf/Qwen3.5-9B-IQ4_XS.gguf \
#     "https://huggingface.co/unsloth/Qwen3.5-9B-GGUF/resolve/main/Qwen3.5-9B-IQ4_XS.gguf"
#
# Hybrid-thinking: requires --chat-template-kwargs '{"enable_thinking":true}'
# in the production plist (see com.mac-llm-lab.llama-server.plist FUTURE-MODEL
# HINT block). Qwen3.5 vendor docs are ambiguous on the default; without the
# flag, cell E silently degrades.
#
# Confirmatory pending: n=8 confirmatory not yet run. Lock-in based on n=2
# mini + n=2 hone-in 2x2 (Sweep 3) consensus. New reference sweep with
# canonical_status flip on the old 7B Q5 rows is planned post-Sweep 4.
#
# History — previous tier-16 model:
#   Qwen2.5-7B-Instruct Q5_K_M (~5.07 GB, dense instruct, no thinking),
#   sampler v1-prod (temp 0.4, top_p 0.8, top_k 20, repeat 1.05, presence 0).
#   Selected over Qwen3-8B (which was hybrid-thinking and burned the
#   256-token wrap-test budget on `<think>` blocks before `<tool_call>`
#   opens — see TIER-EVAL-MEMO-20260427-evening.md). 7B Q5 passed the
#   original 9/9 tier-eval deterministically, ~6× faster end-to-end than
#   the 14B at the same tier. Native `<tool_call>` wrapper per the Qwen2.5
#   chat template — avoided the Coder variant, which hallucinated
#   `<function_call>`. Replaced 2026-05-01 by Qwen3.5-9B IQ4_XS per above.
#
#   Old GGUF: $HOME/.ollama/gguf/Qwen2.5-7B-Instruct-Q5_K_M.gguf
#   (kept on disk; safe to delete after the tier-16 confirmatory sweep
#    re-emits canonical rows under the new model_config_id).
TIER_16_GGUF="$HOME/.ollama/gguf/Qwen3.5-9B-IQ4_XS.gguf"
TIER_16_CTX=32768
TIER_16_BATCH=4096

# Sampler — Sprint 1.19 c6/v6-antiloop family (cell E winner). Same recipe
# as the tier-32 candidate per Sweep 2 cross-tier consistency. min_p left
# at llama.cpp's 0.05 default (TIER_16_MIN_P unset); install script does
# not currently wire --min-p so the default is what runs.
TIER_16_TEMP=0.6
TIER_16_TOP_P=0.95
TIER_16_TOP_K=20
TIER_16_REPEAT_PENALTY=1.1
TIER_16_PRESENCE_PENALTY=0


# ----------------------------------------------------------------------------
# 32 GB — Qwen3.5-9B UD-Q5_K_XL (~6.5 GB, hybrid-thinking, default-thinking-on)
# ----------------------------------------------------------------------------
# Adopted 2026-05-01 after Sprint 1.19 Sweep 2 cell B2 + Sweep 4 ceiling
# confirmation (see host/test/logs/T32-TUNING-PROGRESS.md). At n=2:
#   - 49/49 done passed (100%), Wilson 95% lower-CI 0.927.
#   - Sweep 4 hone-in (α min_p=0.0, β temp=0.7, ε Q6_K_XL @64k) found no
#     extractable perf vs B2: α regressed expression-eval (0/2), β tied within
#     noise but +15pp drift_advisory cost, ε exact tie at bigger footprint.
#     B2 holds as the Pareto pick.
#
# Cross-tier consistency: same c6 sampler family as tier-16 cell E, except
# repeat_penalty stays at 1.0 here (Sweep 2 found rep_pen 1.0 strictly
# dominates 1.1 at this model+ctx), versus 1.1 at tier-16. Diverge only on
# this single axis.
#
# Memory footprint: ~6.5 GB weights + ~4 GB Q8 KV cache @ 64k = ~10.5 GB
# total, leaves ~21 GB headroom on a 32 GB MBP.
#
# Download (unsloth repo, no HF account required):
#   curl -L -C - -o ~/.ollama/gguf/Qwen3.5-9B-UD-Q5_K_XL.gguf \
#     "https://huggingface.co/unsloth/Qwen3.5-9B-GGUF/resolve/main/Qwen3.5-9B-UD-Q5_K_XL.gguf"
#
# Hybrid-thinking: relies on the production plist's
# `--chat-template-kwargs '{"enable_thinking":true}'` (added during tier-16
# lock-in; documented in com.mac-llm-lab.llama-server.plist FUTURE-MODEL HINT).
#
# Confirmatory pending: n=8 confirmatory not yet run. Lock-in based on n=2
# Sweep 2 winner + n=2 Sweep 4 hone-in (3 cells, all dominated or tied).
# Reference sweep on old 14B Q4_K_M c6 baseline planned post-confirmatory to
# flip canonical_status flags under the new model_config_id schema.
#
# History — previous tier-32 model:
#   Qwen3-14B Q4_K_M (~8.4 GB, dense hybrid-thinking), c6 sampler
#   (temp 0.6, top_p 0.95, top_k 20, repeat 1.1, presence 0). The 14B
#   finished its `<think>` block inside the 256-token wrap-test budget where
#   smaller hybrids didn't, so it had been the tier-32 pick since Sprint
#   1.19 c6 emerged as the anti-loop winner. Replaced 2026-05-01 by
#   Qwen3.5-9B UD-Q5_K_XL @ 64k per above — smaller, faster, +5pp pass-rate.
#   Earlier still: Qwen2.5-Coder-14B-Instruct-Q4_K_M (eval 2026-04-27)
#   regressed everything except TTFT (1/8 pass) — emitted Hermes-style
#   `<|tool_call_begin|>` instead of Qwen3 `<tool_call>` XML, so claw.gbnf
#   forced it into the prose branch and no files were written.
#
#   Old GGUF: $HOME/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf
#   (kept on disk; safe to delete after the tier-32 confirmatory sweep
#    re-emits canonical rows under the new model_config_id.)
TIER_32_GGUF="$HOME/.ollama/gguf/Qwen3.5-9B-UD-Q5_K_XL.gguf"
TIER_32_CTX=65536
TIER_32_BATCH=4096

# Sampler — Sprint 1.19 c6/v6-antiloop family (cell B2 winner). Mirrors
# tier-16 cell E except repeat_penalty stays at 1.0 (Sweep 2 found 1.0
# strictly dominates 1.1 at this model+ctx).
TIER_32_TEMP=0.6
TIER_32_TOP_P=0.95
TIER_32_TOP_K=20
TIER_32_REPEAT_PENALTY=1.0
TIER_32_PRESENCE_PENALTY=0


# ----------------------------------------------------------------------------
# 64 GB — Qwen3.6-35B-A3B UD-Q4_K_XL (~21 GB, hybrid attention/SSM MoE,
#         multimodal, default-thinking — suppressed via litellm route, see
#         host/litellm/litellm-config.yaml `claw-llama`
#         extra_body.chat_template_kwargs.enable_thinking=false).
# ----------------------------------------------------------------------------
# Adopted 2026-04-28 after the n=1 sniff test cleared 20/20 on knob-2
# sampler (see host/test/docs/TIER-EVAL-MEMO-20260428-qwen36.md). Treat
# the sampler values below as a v1 starting point — pending a longer
# tuning session.
#
# Download (unsloth repo):
#   curl -L -C - -o ~/.ollama/gguf/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf \
#     "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"
TIER_64_GGUF="$HOME/.ollama/gguf/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

# Context bumped 32768 → 65536 on 2026-04-28: at 32k the model is
# harness-bound on round-3 evals (expression-eval / mini-vm trip
# context-exhaustion at 32–36k tokens before claw can converge). At 64k
# expression-eval passes deterministically. See
# host/test/docs/QWEN3.6-MODEL-REPORT.md recommendation #2.
TIER_64_CTX=65536
TIER_64_BATCH=4096

# Sampler — v1 (vendor non-thinking recipe). The 8-cell n=3 grid on
# 2026-04-28 (host/test/docs/TIER-EVAL-MEMO-20260428-sampler-v2.md) found
# 3 cells tied at 15/15 — including this one — and grid resolution was
# below the within-cell variance floor measured by A2. Don't move until
# n=7 confirmation at (0.3, 1.5) / (0.5, 0) / (0.7, 1.5) separates them.
TIER_64_TEMP=0.7
TIER_64_TOP_P=0.8
TIER_64_TOP_K=20
TIER_64_REPEAT_PENALTY=1.0
TIER_64_PRESENCE_PENALTY=1.5
