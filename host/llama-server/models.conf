# ============================================================================
# Memory tier model configuration for llama-server.
# ============================================================================
# Sourced by scripts/install. Override auto-detection with:
#     LLAMA_TIER=16 ./scripts/install
#
# To configure a tier, set TIER_N_GGUF, TIER_N_CTX, TIER_N_BATCH, plus the
# sampler block (TIER_N_TEMP, TIER_N_TOP_P, TIER_N_TOP_K,
# TIER_N_REPEAT_PENALTY, TIER_N_PRESENCE_PENALTY).
#
# All tiers share the same alias (claw), grammar, and port.


# ----------------------------------------------------------------------------
# 16 GB — Qwen2.5-7B-Instruct Q5_K_M (~5.07 GB, dense instruct, no thinking)
# ----------------------------------------------------------------------------
# Selected over Qwen3-8B (which is hybrid-thinking and burns the 256-token
# wrap-test budget on `<think>` blocks before `<tool_call>` opens — see
# TIER-EVAL-MEMO-20260427-evening.md). 7B Q5 passes the original 9/9
# tier-eval deterministically, ~6× faster end-to-end than the 14B at the
# same tier. Native `<tool_call>` wrapper per the Qwen2.5 chat template —
# avoid the Coder variant, which hallucinates `<function_call>`.
#
# Download (bartowski repo, no HF account required):
#   curl -L -C - -o ~/.ollama/gguf/Qwen2.5-7B-Instruct-Q5_K_M.gguf \
#     "https://huggingface.co/bartowski/Qwen2.5-7B-Instruct-GGUF/resolve/main/Qwen2.5-7B-Instruct-Q5_K_M.gguf"
TIER_16_GGUF="$HOME/.ollama/gguf/Qwen2.5-7B-Instruct-Q5_K_M.gguf"
TIER_16_CTX=32768
TIER_16_BATCH=4096

# Sampler — mirrors host/ollama/Modelfiles/claw.Modelfile, with
# repeat-penalty softened from 1.2 → 1.05 to avoid suppressing `\n` in
# structured prose (see host/llama-server/docs/TODO-PROSE-SMUSH.md).
TIER_16_TEMP=0.4
TIER_16_TOP_P=0.8
TIER_16_TOP_K=20
TIER_16_REPEAT_PENALTY=1.05
TIER_16_PRESENCE_PENALTY=0


# ----------------------------------------------------------------------------
# 32 GB — Qwen3-14B Q4_K_M (~8.4 GB, dense, hybrid-thinking)
# ----------------------------------------------------------------------------
# Default thinking-on; the 14B finishes its `<think>` block inside the
# 256-token wrap-test budget where smaller hybrids don't, so no
# `--reasoning` flag is needed.
#
# Download (unsloth repo, no HF account required):
#   curl -L -C - -o ~/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf \
#     "https://huggingface.co/unsloth/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf"
#
# History — Qwen2.5-Coder-14B-Instruct-Q4_K_M was tried (eval 2026-04-27)
# but regressed everything except TTFT: 1/8 pass. It emits Hermes-style
# tool calls (`<|tool_call_begin|>`), not Qwen3's `<tool_call>` XML, so
# claw.gbnf forces it into the prose branch — model ends turn cleanly,
# claw exits with no files written. Keep the GGUF on disk for a future
# grammar-side experiment.
TIER_32_GGUF="$HOME/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf"
TIER_32_CTX=32768
TIER_32_BATCH=4096

# Sampler — same as tier-16 (claw.Modelfile mirror, prose-smush-softened).
TIER_32_TEMP=0.4
TIER_32_TOP_P=0.8
TIER_32_TOP_K=20
TIER_32_REPEAT_PENALTY=1.05
TIER_32_PRESENCE_PENALTY=0


# ----------------------------------------------------------------------------
# 64 GB — Qwen3.6-35B-A3B UD-Q4_K_XL (~21 GB, hybrid attention/SSM MoE,
#         multimodal, default-thinking — suppressed via litellm route, see
#         host/litellm/litellm-config.yaml `claw-llama`
#         extra_body.chat_template_kwargs.enable_thinking=false).
# ----------------------------------------------------------------------------
# Adopted 2026-04-28 after the n=1 sniff test cleared 20/20 on knob-2
# sampler (see host/test/docs/TIER-EVAL-MEMO-20260428-qwen36.md). Treat
# the sampler values below as a v1 starting point — pending a longer
# tuning session.
#
# Download (unsloth repo):
#   curl -L -C - -o ~/.ollama/gguf/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf \
#     "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"
TIER_64_GGUF="$HOME/.ollama/gguf/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

# Context bumped 32768 → 65536 on 2026-04-28: at 32k the model is
# harness-bound on round-3 evals (expression-eval / mini-vm trip
# context-exhaustion at 32–36k tokens before claw can converge). At 64k
# expression-eval passes deterministically. See
# host/test/docs/QWEN3.6-MODEL-REPORT.md recommendation #2.
TIER_64_CTX=65536
TIER_64_BATCH=4096

# Sampler — v1 (vendor non-thinking recipe). The 8-cell n=3 grid on
# 2026-04-28 (host/test/docs/TIER-EVAL-MEMO-20260428-sampler-v2.md) found
# 3 cells tied at 15/15 — including this one — and grid resolution was
# below the within-cell variance floor measured by A2. Don't move until
# n=7 confirmation at (0.3, 1.5) / (0.5, 0) / (0.7, 1.5) separates them.
TIER_64_TEMP=0.7
TIER_64_TOP_P=0.8
TIER_64_TOP_K=20
TIER_64_REPEAT_PENALTY=1.0
TIER_64_PRESENCE_PENALTY=1.5
