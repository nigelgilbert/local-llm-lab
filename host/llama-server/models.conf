# Memory tier model configuration for llama-server.
# Sourced by scripts/install. Override auto-detection with: LLAMA_TIER=16 ./scripts/install
#
# To configure a tier: set TIER_N_GGUF, TIER_N_CTX, TIER_N_BATCH.
# All tiers share the same alias (claw), grammar, sampler, and port.

# 16 GB — Qwen3-14B Q4_K_M (~9 GB)
# Download (unsloth repo, no HF account required):
# curl -L -C - -o ~/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf \
#   "https://huggingface.co/unsloth/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf"
#
# History — Qwen2.5-Coder-14B-Instruct-Q4_K_M was tried (eval 2026-04-27) but
# regressed everything except TTFT: 1/8 pass. It emits Hermes-style tool calls
# (`<|tool_call_begin|>`), not Qwen3's `<tool_call>` XML, so claw.gbnf forces
# it into the prose branch — model ends turn cleanly, claw exits with no
# files written. Keep the GGUF on disk for a future grammar-side experiment.
TIER_16_GGUF="$HOME/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf"
TIER_16_CTX=32768
TIER_16_BATCH=4096

# 32 GB — Qwen3-30B-A3B-Instruct-2507 Q4_K_XL (~16 GB, MoE 3B active)
# Download:
# curl -L -C - -o ~/.ollama/gguf/Qwen3-30B-A3B-Instruct-2507-UD-Q4_K_XL.gguf \
#   "https://huggingface.co/unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF/resolve/main/Qwen3-30B-A3B-Instruct-2507-UD-Q4_K_XL.gguf"
TIER_32_GGUF="$HOME/.ollama/gguf/Qwen3-30B-A3B-Instruct-2507-UD-Q4_K_XL.gguf"
TIER_32_CTX=32768
TIER_32_BATCH=4096

# 64 GB — Qwen3-Coder-30B Q6_K_XL (~24 GB)
TIER_64_GGUF="$HOME/.ollama/gguf/Qwen3-Coder-30B-A3B-Instruct-UD-Q6_K_XL.gguf"
TIER_64_CTX=32768
TIER_64_BATCH=4096
