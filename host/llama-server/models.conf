# Memory tier model configuration for llama-server.
# Sourced by scripts/install. Override auto-detection with: LLAMA_TIER=16 ./scripts/install
#
# To configure a tier: set TIER_N_GGUF, TIER_N_CTX, TIER_N_BATCH.
# All tiers share the same alias (claw), grammar, sampler, and port.

# 16 GB — Qwen2.5-7B-Instruct Q5_K_M (~5.07 GB, dense instruct, no thinking)
# Selected over Qwen3-8B (which is hybrid-thinking and burns the 256-token wrap-test
# budget on `<think>` blocks before `<tool_call>` opens — see TIER-EVAL-MEMO-20260427-evening.md).
# 7B Q5 passes the original 9/9 tier-eval deterministically, ~6× faster end-to-end
# than the 14B at the same tier. Native `<tool_call>` wrapper per the Qwen2.5
# chat template — avoid the Coder variant, which hallucinates `<function_call>`.
# Download (bartowski repo, no HF account required):
# curl -L -C - -o ~/.ollama/gguf/Qwen2.5-7B-Instruct-Q5_K_M.gguf \
#   "https://huggingface.co/bartowski/Qwen2.5-7B-Instruct-GGUF/resolve/main/Qwen2.5-7B-Instruct-Q5_K_M.gguf"
TIER_16_GGUF="$HOME/.ollama/gguf/Qwen2.5-7B-Instruct-Q5_K_M.gguf"
TIER_16_CTX=32768
TIER_16_BATCH=4096

# 32 GB — Qwen3-14B Q4_K_M (~8.4 GB, dense, hybrid-thinking)
# Default thinking-on; the 14B finishes its `<think>` block inside the 256-token
# wrap-test budget where smaller hybrids don't, so no `--reasoning` flag is needed.
# Download (unsloth repo, no HF account required):
# curl -L -C - -o ~/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf \
#   "https://huggingface.co/unsloth/Qwen3-14B-GGUF/resolve/main/Qwen3-14B-Q4_K_M.gguf"
#
# History — Qwen2.5-Coder-14B-Instruct-Q4_K_M was tried (eval 2026-04-27) but
# regressed everything except TTFT: 1/8 pass. It emits Hermes-style tool calls
# (`<|tool_call_begin|>`), not Qwen3's `<tool_call>` XML, so claw.gbnf forces
# it into the prose branch — model ends turn cleanly, claw exits with no
# files written. Keep the GGUF on disk for a future grammar-side experiment.
TIER_32_GGUF="$HOME/.ollama/gguf/Qwen3-14B-Q4_K_M.gguf"
TIER_32_CTX=32768
TIER_32_BATCH=4096

# 64 GB — Qwen3-Coder-30B Q6_K_XL (~24 GB)
TIER_64_GGUF="$HOME/.ollama/gguf/Qwen3-Coder-30B-A3B-Instruct-UD-Q6_K_XL.gguf"
TIER_64_CTX=32768
TIER_64_BATCH=4096
