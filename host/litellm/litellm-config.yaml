# LiteLLM proxy: accept Anthropic /v1/messages from clients, forward to Ollama /api/chat.
# Each model_name below is what a client can request via --model <name>.
# All names route through ollama_chat/* so tool-use / system prompts pass through cleanly.

model_list:
  - model_name: general
    litellm_params:
      model: ollama_chat/general
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: fast
    litellm_params:
      model: ollama_chat/fast
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: reasoning
    litellm_params:
      model: ollama_chat/reasoning
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: digest
    litellm_params:
      model: ollama_chat/digest
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: analyze
    litellm_params:
      model: ollama_chat/analyze
      api_base: os.environ/OLLAMA_API_BASE

  # `claw` is the agentic-coding profile — only profile besides `general`
  # with `tools` capability declared. Daily driver for client/claw-code/.
  #
  # Routed via openai/ provider hitting llama.cpp's /v1/chat/completions
  # endpoint (OpenAI-compat). Two reasons claw lives on llama-server, not Ollama:
  #
  #   1. Streaming tool-use: ollama_chat/* drops tool_calls.arguments on the
  #      Anthropic SSE translation path; openai/* against either upstream keeps
  #      them intact (with the patches/streaming_iterator.py shim — see header
  #      of that file for the LiteLLM bug + scope).
  #   2. Grammar-constrained decoding: llama.cpp's --grammar-file enforces the
  #      <tool_call>...</tool_call> wrapping at sample-time, eliminating
  #      qwen3-coder's ~1-in-3 raw-JSON wrap failures. Ollama doesn't surface
  #      this knob yet. See ../llama-server/README.md.
  #
  # NOTE: by default LiteLLM auto-routes openai/* + Anthropic /v1/messages input
  # through the OpenAI Responses API (/v1/responses), where tool-call parsing
  # falls back to text content for large request shapes (claw's 50+ tools).
  # The `use_chat_completions_url_for_anthropic_messages: true` flag below pins
  # all openai/* Anthropic-input traffic to /v1/chat/completions instead.
  - model_name: claw
    litellm_params:
      model: openai/claw
      api_base: os.environ/LLAMA_SERVER_BASE
      api_key: llama-server-no-auth

  - model_name: anthropic/claw
    litellm_params:
      model: openai/claw
      api_base: os.environ/LLAMA_SERVER_BASE
      api_key: llama-server-no-auth

  # A/B test routes for host/test/. Same upstream targets as `claw`, but
  # explicitly named so a single test run can route at both backends without
  # touching production. `claw-ollama` points at the ephemeral `claw-test`
  # Ollama alias that host/test/run.sh creates and tears down per-run.
  - model_name: claw-llama
    litellm_params:
      model: openai/claw
      api_base: os.environ/LLAMA_SERVER_BASE
      api_key: llama-server-no-auth
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  - model_name: anthropic/claw-llama
    litellm_params:
      model: openai/claw
      api_base: os.environ/LLAMA_SERVER_BASE
      api_key: llama-server-no-auth
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  - model_name: claw-ollama
    litellm_params:
      model: openai/claw-test
      api_base: os.environ/OLLAMA_OPENAI_BASE
      api_key: ollama-no-auth
  - model_name: anthropic/claw-ollama
    litellm_params:
      model: openai/claw-test
      api_base: os.environ/OLLAMA_OPENAI_BASE
      api_key: ollama-no-auth
  - model_name: anthropic/general
    litellm_params:
      model: ollama_chat/general
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: anthropic/fast
    litellm_params:
      model: ollama_chat/fast
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: anthropic/reasoning
    litellm_params:
      model: ollama_chat/reasoning
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: anthropic/digest
    litellm_params:
      model: ollama_chat/digest
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: anthropic/analyze
    litellm_params:
      model: ollama_chat/analyze
      api_base: os.environ/OLLAMA_API_BASE

  # Catch-all so a client's built-in aliases (sonnet -> claude-sonnet-4-6 etc.)
  # land on `general` instead of erroring out.
  - model_name: "*"
    litellm_params:
      model: ollama_chat/general
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  # Drop Anthropic-only params (top_k, metadata, ...) Ollama doesn't accept.
  drop_params: true
  # Pin Anthropic /v1/messages → openai/* traffic to /v1/chat/completions.
  # Without this, LiteLLM auto-routes openai/* through /v1/responses, where
  # Ollama's tool-call parser drops to text content for large request shapes
  # (verified with claw-code's 54-tool requests — see comment on the `claw`
  # route above).
  use_chat_completions_url_for_anthropic_messages: true
  # Per-request bridge logger for iteration-distribution work (W1). Module
  # lives in ../callbacks/, mounted to /app/callbacks/ via
  # ../litellm/docker-compose.yml. Writes /runtime/_bridge.jsonl, which the
  # test harness slices per-run by time-window.
  callbacks: ["callbacks.iter_distribution_logger.iter_distribution_callback"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  allow_requests_on_db_unavailable: true
