services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: home-llm-lab-litellm
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      # Patch: LiteLLM's Anthropic streaming SSE adapter drops tool_call args
      # when the upstream provider emits the entire tool_call in a single
      # chunk (Ollama does — qwen3-coder's <tool_call>...</tool_call> wrapping
      # arrives whole). The patched file re-emits those args as a
      # content_block_delta(input_json_delta) right after content_block_start,
      # which is what Anthropic clients (claw-code, etc.) expect. See
      # ./patches/streaming_iterator.py for the diff.
      - ./patches/streaming_iterator.py:/usr/lib/python3.13/site-packages/litellm/llms/anthropic/experimental_pass_through/adapters/streaming_iterator.py:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--num_workers"
      - "1"
      - "--max_requests_before_restart"
      - "1000"
    environment:
      - OLLAMA_API_BASE=http://${OLLAMA_HOST}:${OLLAMA_PORT}
      - OLLAMA_OPENAI_BASE=http://${OLLAMA_HOST}:${OLLAMA_PORT}/v1
      - LLAMA_SERVER_BASE=http://${LLAMA_SERVER_HOST}:${LLAMA_SERVER_PORT}/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # LiteLLM image ships python3 but not curl/wget. urlopen raises on
      # connection failure or non-2xx, which gives a non-zero exit naturally.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
