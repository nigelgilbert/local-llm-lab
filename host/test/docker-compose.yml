# Ephemeral test container. Always invoked via `docker compose run --rm test`,
# never `up -d`. BACKEND is set per-phase by run.sh.

services:
  test:
    build:
      context: .
    image: mac-llm-lab-test:local
    working_dir: /test
    env_file:
      - ../litellm/.env
    environment:
      - BRIDGE_URL=http://host.docker.internal:4000
      - ANTHROPIC_BASE_URL=http://host.docker.internal:4000
      - ANTHROPIC_API_KEY=${LITELLM_MASTER_KEY}
      - BACKEND=${BACKEND:-llama-server}
      - MODEL_LABEL=${MODEL_LABEL:-}
      - TIER=${TIER:-64}
      - TEST_SUITE=${TEST_SUITE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Iteration-distribution per-run artifacts. Static mount (the v2 plan
      # rejected dynamic per-run remounts under a long-lived service); per-run
      # subdirectories are created by runClaw() under <run-id>/. Mirror mount in
      # ../litellm/docker-compose.yml so the LiteLLM custom callback writes to
      # the same host directory.
      - ./.claw-runtime:/workspace/.claw-runtime
